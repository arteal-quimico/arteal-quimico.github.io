<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arte Alquímico — Lcdo. Rolando Ordóñez Segovia</title>
<meta name="description" content="Arte Alquímico — Pintura, grabado, escultura, dibujo y técnica en café soluble. Obras originales y trabajos bajo pedido. / Fine Art by Lcdo. Rolando Ordóñez Segovia.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════════════ */
:root {
  --gold:       #c9a84c;
  --gold-light: #e8c97a;
  --gold-dark:  #7a5f20;
  --ink:        #0d0b08;
  --ink2:       #1a1710;
  --ink3:       #2a2620;
  --parch:      #f5f0e8;
  --parch2:     #ede5d0;
  --text-dark:  #1a1710;
  --text-mid:   #4a4030;
  --text-light: #8a7a60;
  --smoke:      rgba(201,168,76,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--ink);
  color: var(--parch);
  overflow-x: hidden;
  cursor: default;
}

/* ═══════════════════════════════════════════════════
   GRAIN OVERLAY
═══════════════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.5;
}

/* ═══════════════════════════════════════════════════
   LANGUAGE TOGGLE
═══════════════════════════════════════════════════ */
.lang-toggle {
  display: flex;
  gap: 0;
  border: 1px solid var(--gold-dark);
  border-radius: 4px;
  overflow: hidden;
}
.lang-btn {
  padding: 6px 14px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 1.5px;
  background: transparent;
  color: var(--gold);
  border: none;
  cursor: pointer;
  transition: all 0.3s;
}
.lang-btn.active, .lang-btn:hover {
  background: var(--gold);
  color: var(--ink);
}
.lang-btn + .lang-btn { border-left: 1px solid var(--gold-dark); }

/* ═══════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(to bottom, rgba(13,11,8,0.98), rgba(13,11,8,0));
  backdrop-filter: blur(2px);
  transition: background 0.4s;
}
nav.scrolled {
  background: rgba(13,11,8,0.97);
  border-bottom: 1px solid rgba(201,168,76,0.15);
}
.nav-logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 16px;
  color: var(--gold);
  letter-spacing: 2px;
  text-decoration: none;
  white-space: nowrap;
}
.nav-left {
  display: flex;
  align-items: center;
  gap: 32px;
  flex: 1;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-links {
  display: flex;
  gap: 24px;
  list-style: none;
  align-items: center;
}
.nav-links a {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--parch2);
  text-decoration: none;
  transition: color 0.3s;
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0;
  width: 0; height: 1px;
  background: var(--gold);
  transition: width 0.3s;
}
.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { width: 100%; }

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 24px;
  height: 1px;
  background: var(--gold);
  transition: all 0.3s;
}
.mobile-menu {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(13,11,8,0.97);
  z-index: 800;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  letter-spacing: 4px;
  color: var(--gold);
  text-decoration: none;
  text-transform: uppercase;
  transition: opacity 0.2s;
}
.mobile-menu a:hover { opacity: 0.7; }

/* ═══════════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════════ */
#hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: var(--ink);
}

/* Alchemical circle background */
.alch-circle {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(700px, 95vw);
  height: min(700px, 95vw);
  opacity: 0.06;
  animation: slowSpin 80s linear infinite;
}
@keyframes slowSpin { to { transform: translate(-50%, -50%) rotate(360deg); } }

.hero-content {
  position: relative;
  text-align: center;
  padding: 100px 24px 80px;
  max-width: 800px;
  animation: heroFade 1.6s ease both;
}
@keyframes heroFade {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.hero-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
  opacity: 0.8;
}
.hero-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(38px, 7vw, 80px);
  font-weight: 700;
  line-height: 1.1;
  color: var(--gold-light);
  text-shadow: 0 0 60px rgba(201,168,76,0.3);
  margin-bottom: 12px;
}
.hero-subtitle {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(14px, 2.5vw, 22px);
  font-weight: 400;
  color: var(--gold);
  opacity: 0.7;
  letter-spacing: 3px;
  margin-bottom: 28px;
}
.hero-tagline {
  font-style: italic;
  font-size: clamp(16px, 2vw, 21px);
  color: var(--parch2);
  opacity: 0.75;
  max-width: 520px;
  margin: 0 auto 48px;
  line-height: 1.7;
}
.hero-divider {
  width: 120px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  margin: 0 auto 48px;
}
.hero-cta {
  display: inline-flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.btn-gold {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 14px 36px;
  border: 1px solid var(--gold);
  color: var(--gold);
  background: transparent;
  text-decoration: none;
  transition: all 0.3s;
  cursor: pointer;
}
.btn-gold:hover {
  background: var(--gold);
  color: var(--ink);
}
.btn-gold.filled {
  background: var(--gold);
  color: var(--ink);
}
.btn-gold.filled:hover {
  background: var(--gold-light);
  border-color: var(--gold-light);
}

.hero-scroll {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--gold);
  opacity: 0.5;
  animation: bounce 2s ease infinite;
}
@keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }
.hero-scroll::after {
  content: '';
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--gold), transparent);
}

/* ═══════════════════════════════════════════════════
   SECTIONS COMMON
═══════════════════════════════════════════════════ */
section { position: relative; }

.section-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 100px 40px;
}

.section-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.7;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(24px, 4vw, 42px);
  color: var(--gold-light);
  margin-bottom: 20px;
  line-height: 1.2;
}
.section-divider {
  width: 80px;
  height: 1px;
  background: linear-gradient(to right, var(--gold), transparent);
  margin-bottom: 48px;
}
.bilingual {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
}
@media (max-width: 700px) { .bilingual { grid-template-columns: 1fr; gap: 24px; } }
.bilingual .lang-es, .bilingual .lang-en {
  font-size: 17px;
  line-height: 1.9;
  color: var(--parch2);
  opacity: 0.85;
}
.bilingual .lang-en { color: var(--parch); opacity: 0.6; font-style: italic; border-left: 1px solid rgba(201,168,76,0.2); padding-left: 48px; }
@media (max-width: 700px) { .bilingual .lang-en { border-left: none; padding-left: 0; border-top: 1px solid rgba(201,168,76,0.2); padding-top: 24px; } }

/* ═══════════════════════════════════════════════════
   ABOUT / HISTORIA
═══════════════════════════════════════════════════ */
#about {
  background: var(--ink2);
}
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1.6fr;
  gap: 80px;
  align-items: start;
}
@media (max-width: 860px) { .about-grid { grid-template-columns: 1fr; gap: 48px; } }

.about-portrait {
  position: relative;
}
.portrait-frame {
  width: 100%;
  aspect-ratio: 3/4;
  background: var(--ink3);
  border: 1px solid rgba(201,168,76,0.2);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.portrait-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: sepia(20%) contrast(1.05);
  transition: transform 0.6s ease;
}
.portrait-frame:hover img { transform: scale(1.03); }
.portrait-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  color: var(--gold);
  opacity: 0.3;
}
.portrait-placeholder svg { width: 64px; height: 64px; }
.portrait-placeholder span { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; }

/* Corner ornaments */
.portrait-frame::before, .portrait-frame::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.5;
  z-index: 2;
}
.portrait-frame::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
.portrait-frame::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

.portrait-caption {
  margin-top: 16px;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.5;
  text-align: center;
}

/* Techniques badges */
.techniques {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 40px;
}
.tech-badge {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 7px 16px;
  border: 1px solid rgba(201,168,76,0.35);
  color: var(--gold);
  opacity: 0.8;
  transition: all 0.3s;
}
.tech-badge:hover {
  background: rgba(201,168,76,0.08);
  opacity: 1;
}
.tech-badge.special {
  border-color: var(--gold);
  background: rgba(201,168,76,0.08);
  opacity: 1;
}

/* ═══════════════════════════════════════════════════
   GALLERY
═══════════════════════════════════════════════════ */
#gallery { background: var(--ink); }

.gallery-filter {
  display: flex;
  gap: 0;
  margin-bottom: 48px;
  flex-wrap: wrap;
  border: 1px solid rgba(201,168,76,0.2);
  width: fit-content;
}
.filter-btn {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 24px;
  background: transparent;
  color: var(--gold);
  border: none;
  border-right: 1px solid rgba(201,168,76,0.2);
  cursor: pointer;
  transition: all 0.3s;
  opacity: 0.6;
}
.filter-btn:last-child { border-right: none; }
.filter-btn.active, .filter-btn:hover { background: rgba(201,168,76,0.1); opacity: 1; }

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.gallery-item {
  position: relative;
  overflow: hidden;
  background: var(--ink3);
  border: 1px solid rgba(201,168,76,0.1);
  cursor: pointer;
  transition: transform 0.4s ease, border-color 0.3s;
}
.gallery-item:hover { transform: translateY(-4px); border-color: rgba(201,168,76,0.35); }
.gallery-item.featured { grid-column: span 2; }
@media (max-width: 640px) { .gallery-item.featured { grid-column: span 1; } }

.gallery-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  display: block;
  filter: sepia(10%);
  transition: transform 0.5s ease, filter 0.3s;
}
.gallery-item:hover .gallery-img { transform: scale(1.04); filter: sepia(0%); }

/* Placeholder when no image */
.gallery-placeholder {
  width: 100%;
  aspect-ratio: 4/3;
  background: var(--ink3);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--gold);
  opacity: 0.25;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
}

.gallery-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(13,11,8,0.9) 0%, transparent 50%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 20px;
  opacity: 0;
  transition: opacity 0.3s;
}
.gallery-item:hover .gallery-overlay { opacity: 1; }

.overlay-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--gold-light);
  margin-bottom: 4px;
}
.overlay-tech {
  font-size: 12px;
  color: var(--parch2);
  opacity: 0.7;
  font-style: italic;
}

.gallery-add-note {
  margin-top: 40px;
  text-align: center;
  font-style: italic;
  color: var(--gold);
  opacity: 0.5;
  font-size: 15px;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
}

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(13,11,8,0.95);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 40px;
}
.lightbox.open { display: flex; }
.lightbox-img {
  max-width: 80vw;
  max-height: 80vh;
  object-fit: contain;
  border: 1px solid rgba(201,168,76,0.3);
}
.lightbox-close {
  position: absolute;
  top: 24px; right: 32px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold);
  cursor: pointer;
  background: none;
  border: none;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.lightbox-close:hover { opacity: 1; }

/* ═══════════════════════════════════════════════════
   SHOP / TIENDA
═══════════════════════════════════════════════════ */
#shop { background: var(--ink2); }

.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
  margin-bottom: 64px;
}
.shop-card {
  background: var(--ink3);
  border: 1px solid rgba(201,168,76,0.15);
  transition: border-color 0.3s, transform 0.3s;
}
.shop-card:hover {
  border-color: rgba(201,168,76,0.4);
  transform: translateY(-3px);
}
.shop-img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
  filter: sepia(10%);
  transition: filter 0.3s;
}
.shop-card:hover .shop-img { filter: sepia(0%); }
.shop-img-placeholder {
  width: 100%;
  aspect-ratio: 1;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
  opacity: 0.2;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
}
.shop-info { padding: 24px; }
.shop-title {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 1px;
  color: var(--gold-light);
  margin-bottom: 8px;
}
.shop-tech {
  font-style: italic;
  font-size: 13px;
  color: var(--parch2);
  opacity: 0.6;
  margin-bottom: 16px;
}
.shop-desc {
  font-size: 14px;
  line-height: 1.7;
  color: var(--parch2);
  opacity: 0.7;
  margin-bottom: 20px;
}
.shop-price {
  font-family: 'Cinzel Decorative', serif;
  font-size: 22px;
  color: var(--gold);
  margin-bottom: 16px;
}
.shop-price span {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--gold);
  opacity: 0.6;
  letter-spacing: 2px;
  display: block;
  margin-top: 4px;
}
.shop-btn {
  display: block;
  width: 100%;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 12px;
  border: 1px solid var(--gold);
  color: var(--gold);
  background: transparent;
  text-decoration: none;
  transition: all 0.3s;
  cursor: pointer;
}
.shop-btn:hover { background: var(--gold); color: var(--ink); }

/* Custom order banner */
.custom-banner {
  background: var(--ink3);
  border: 1px solid rgba(201,168,76,0.3);
  padding: 48px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.custom-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(201,168,76,0.06) 0%, transparent 70%);
}
.custom-banner-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(20px, 3vw, 30px);
  color: var(--gold-light);
  margin-bottom: 16px;
  position: relative;
}
.custom-banner-text {
  font-style: italic;
  font-size: 17px;
  color: var(--parch2);
  opacity: 0.75;
  max-width: 560px;
  margin: 0 auto 32px;
  line-height: 1.7;
  position: relative;
}
.custom-banner-en {
  font-size: 14px;
  color: var(--parch);
  opacity: 0.4;
  font-style: italic;
  max-width: 480px;
  margin: 0 auto 32px;
  line-height: 1.6;
  position: relative;
}

/* ═══════════════════════════════════════════════════
   CONTACT
═══════════════════════════════════════════════════ */
#contact { background: var(--ink); }

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: start;
}
@media (max-width: 760px) { .contact-grid { grid-template-columns: 1fr; gap: 48px; } }

.contact-info { }
.contact-links {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 36px;
}
.contact-link {
  display: flex;
  align-items: center;
  gap: 16px;
  text-decoration: none;
  color: var(--parch2);
  transition: color 0.3s;
  padding: 16px 0;
  border-bottom: 1px solid rgba(201,168,76,0.1);
}
.contact-link:hover { color: var(--gold); }
.contact-link:hover .contact-link-icon { background: var(--gold); }
.contact-link-icon {
  width: 44px; height: 44px;
  border: 1px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.3s;
}
.contact-link-icon svg { width: 20px; height: 20px; }
.contact-link-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.6;
  display: block;
